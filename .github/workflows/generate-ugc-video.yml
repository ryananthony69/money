name: Generate Infinite Money Glitch UGC Video V2

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-video-v2:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install media and neural voice dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg espeak-ng libsndfile1 fonts-dejavu-core fonts-liberation
          python -m pip install --upgrade pip
          pip install kokoro-onnx soundfile gdown==5.2.0 numpy Pillow

      - name: Download Kokoro neural voice model
        run: |
          mkdir -p models
          curl -fL --retry 4 --retry-delay 3 \
            -o models/kokoro-v1.0.int8.onnx \
            https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/kokoro-v1.0.int8.onnx
          curl -fL --retry 4 --retry-delay 3 \
            -o models/voices-v1.0.bin \
            https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/voices-v1.0.bin
          test -s models/kokoro-v1.0.int8.onnx
          test -s models/voices-v1.0.bin

      - name: Generate animated AI creator UGC video
        env:
          KOKORO_VOICE: am_michael
          KOKORO_SPEED: "1.04"
          FINAL_PRESET: medium
          FINAL_CRF: "17"
        run: |
          set -o pipefail
          if [ -f patch_mouth.py ]; then python patch_mouth.py; fi
          python render.py 2>&1 | tee render.log

      - name: Validate generated media
        run: |
          test -s output/infinite-money-glitch-ugc-v2.mp4
          test -s output/thumbnail-v2.jpg
          test -s output/report-v2.json
          ffprobe -v error -select_streams v:0 \
            -show_entries stream=codec_name,width,height,r_frame_rate \
            -of default=noprint_wrappers=1 output/infinite-money-glitch-ugc-v2.mp4
          ffprobe -v error -select_streams a:0 \
            -show_entries stream=codec_name,sample_rate,channels \
            -of default=noprint_wrappers=1 output/infinite-money-glitch-ugc-v2.mp4
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path('output/report-v2.json').read_text())
          assert report['resolution'] == '1080x1920'
          assert report['voice_engine'] == 'Kokoro ONNX'
          assert report['robotic_fallback'] is False
          assert report['creator_screen_share_percent'] >= 50
          print(report)
          PY

      - name: Upload render diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: infinite-money-glitch-ugc-v2-diagnostics
          path: |
            render.log
            output/*
            work/narration*.wav
            work/captions.ass
          if-no-files-found: warn
          retention-days: 7

      - name: Upload final V2 video artifact
        uses: actions/upload-artifact@v4
        with:
          name: infinite-money-glitch-ugc-v2
          path: |
            output/infinite-money-glitch-ugc-v2.mp4
            output/thumbnail-v2.jpg
            output/transcript-v2.txt
            output/report-v2.json
          if-no-files-found: error
          retention-days: 30
