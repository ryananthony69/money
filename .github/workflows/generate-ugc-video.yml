name: Generate Infinite Money Glitch UGC Video

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install media dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg espeak fonts-dejavu-core fonts-liberation
          python -m pip install --upgrade pip
          pip install edge-tts==7.2.3 gdown==5.2.0

      - name: Generate vertical UGC video
        env:
          EDGE_TTS_VOICE: en-US-GuyNeural
          FINAL_PRESET: medium
          FINAL_CRF: "17"
        run: python render.py

      - name: Validate generated media
        run: |
          test -s output/infinite-money-glitch-ugc.mp4
          ffprobe -v error \
            -show_entries format=duration,size \
            -show_entries stream=codec_type,codec_name,width,height \
            -of json output/infinite-money-glitch-ugc.mp4

      - name: Upload final video artifact
        uses: actions/upload-artifact@v4
        with:
          name: infinite-money-glitch-ugc
          path: |
            output/infinite-money-glitch-ugc.mp4
            output/thumbnail.jpg
            output/transcript.txt
            output/report.json
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
